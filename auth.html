<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{font-family:Arial;text-align:center;padding-top:120px;background:#f5f5f7;}
.box{background:white;width:300px;margin:auto;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
input{width:90%;padding:10px;margin:5px;border-radius:10px;border:1px solid #ccc;}
button{width:95%;padding:10px;background:black;color:white;border:none;border-radius:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل / دخول</h2>
<input id="user" placeholder="اسم المستخدم">
<input id="pass" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<script>
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

localStorage.setItem("user",u);
alert("تم تسجيل الدخول 👤");
location.href="index.html";
}
</script>

</body>
</html>
<a href="index.html">دخول</a>
