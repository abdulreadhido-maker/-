<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السلة</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f7;text-align:center;}
header{background:white;padding:15px;}
a{margin:10px;text-decoration:none;color:black;font-weight:bold;}

li{
list-style:none;
padding:10px;
border-bottom:1px solid #ddd;
}

button{
background:red;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<a href="index.html">الرئيسية</a>
<a href="shop.html">المتجر</a>
<a href="cart.html">السلة</a>
</header>

<h1>🛒 سلة المشتريات</h1>

<ul id="list"></ul>

<button onclick="clearCart()">مسح السلة</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let list = document.getElementById("list");

cart.forEach(item=>{
let li = document.createElement("li");
li.textContent = item;
list.appendChild(li);
});

function clearCart(){
localStorage.removeItem("cart");
location.reload();
}
</script>

</body>
</html>
