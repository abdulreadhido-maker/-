<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الدفع</title>

<style>
body{
font-family:Arial;
background:linear-gradient(#f5f5f7,#fff);
text-align:center;
padding-top:100px;
}

.box{
background:white;
margin:auto;
width:320px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:95%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>💳 الدفع النهائي</h2>

<input placeholder="الاسم">
<input placeholder="العنوان">
<input placeholder="رقم البطاقة">

<button onclick="pay()">إتمام الدفع</button>
</div>

<script>
function pay(){
localStorage.removeItem("cart");
alert("🎉 تم الدفع بنجاح!");
location.href="index.html";
}
</script>

</body>
</html>
