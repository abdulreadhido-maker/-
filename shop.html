<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المتجر</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f7;text-align:center;}
header{background:white;padding:15px;}
a{margin:10px;text-decoration:none;color:black;font-weight:bold;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
background:black;
color:white;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<a href="index.html">الرئيسية</a>
<a href="shop.html">المتجر</a>
<a href="cart.html">السلة</a>
</header>

<h1>🛒 المنتجات</h1>

<div class="products">

<div class="card">
<h3>آيفون</h3>
<p>4500 ريال</p>
<button onclick="add('آيفون')">إضافة</button>
</div>

<div class="card">
<h3>سامسونج</h3>
<p>3200 ريال</p>
<button onclick="add('سامسونج')">إضافة</button>
</div>

<div class="card">
<h3>سماعات</h3>
<p>900 ريال</p>
<button onclick="add('سماعات')">إضافة</button>
</div>

</div>

<script>
function add(item){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push(item);
localStorage.setItem("cart", JSON.stringify(cart));
alert("تمت الإضافة 🛒");
}
</script>

</body>
</html>
<a href="index.html">الرئيسية</a>
<a href="shop.html">المتجر</a>
<a href="cart.html">السلة</a>
